<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VaultBank - Login</title>
    <link rel="stylesheet" href="bank.css" />
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-logo">
                <div class="logo-icon"><svg viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 10.99h7c-.53 4.12-3.28 7.79-7 8.94V12H5V6.3l7-3.11v8.8z"/></svg></div>
                <h1>VaultBank</h1>
                <p>Secure Online Banking</p>
            </div>
            <div class="error-message" id="errorMsg"></div>
            <form id="loginForm">
                <div class="form-group">
                    <label for="accountNumber">Account Number</label>
                    <input type="text" id="accountNumber" placeholder="Enter your account number" required inputmode="numeric" pattern="[0-9]*" />
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter your password" required />
                </div>
                <button type="submit" class="btn btn-primary">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4" />
                        <polyline points="10 17 15 12 10 7" />
                        <line x1="15" y1="12" x2="3" y2="12" />
                    </svg>
                    Sign In
                </button>
            </form>
            <div class="auth-footer">Don't have an account? <a href="signup.html">Create Account</a></div>
        </div>
    </div>
    <script src="bank.js"></script>
    <script>
        if (isLoggedIn()) window.location.href = 'dashboard.html';

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const acc = document.getElementById('accountNumber').value.trim();
            const pass = document.getElementById('password').value;
            const err = document.getElementById('errorMsg');
            err.classList.remove('show');

            if (!acc) { err.textContent = 'Please enter your account number.'; err.classList.add('show'); return; }
            if (!pass) { err.textContent = 'Please enter your password.'; err.classList.add('show'); return; }

            const users = getUsers();
            const user = users[acc];
            if (!user) {
                err.textContent = 'No account found with this number. Please create an account.';
                err.classList.add('show');
                return;
            }
            if (user.password !== pass) {
                err.textContent = 'Incorrect password. Please try again.';
                err.classList.add('show');
                return;
            }

            setSession(user);
            showToast('Welcome back, ' + user.fullName + '!', 'success');
            setTimeout(() => { window.location.href = 'dashboard.html'; }, 500);
        });
    </script>
</body>
</html>
