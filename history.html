<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VaultBank - Transaction History</title>
    <link rel="stylesheet" href="bank.css">
</head>
<body>
    <div class="main-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-logo">
                <div class="logo-small">
                    <div class="icon">VB</div>
                    <span>VaultBank</span>
                </div>
            </div>
            <nav class="sidebar-nav">
                <a href="dashboard.html">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
                    Dashboard
                </a>
                <a href="transfer.html">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
                    Transfer
                </a>
                <a href="bills.html">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="4" width="22" height="16" rx="2" ry="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>
                    Pay Bills
                </a>
                <a href="history.html" class="active">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                    History
                </a>
            </nav>
            <div class="sidebar-footer">
                <div class="user-info" id="sidebarUser"></div>
                <button class="btn btn-outline btn-sm" onclick="logout()" style="width:100%;">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                    Sign Out
                </button>
            </div>
        </aside>
        
        <main class="main-content">
            <div class="top-bar">
                <div>
                    <h2>Transaction History</h2>
                    <div class="breadcrumb">Home / <span>History</span></div>
                </div>
            </div>
            
            <!-- Filters -->
            <div class="card">
                <div style="display:flex;gap:16px;flex-wrap:wrap;align-items:flex-end;">
                    <div class="form-group" style="margin-bottom:0;flex:1;min-width:150px;">
                        <label for="filterType">Type</label>
                        <select id="filterType">
                            <option value="all">All Transactions</option>
                            <option value="credit">Credits Only</option>
                            <option value="debit">Debits Only</option>
                        </select>
                    </div>
                    <div class="form-group" style="margin-bottom:0;flex:1;min-width:150px;">
                        <label for="filterCategory">Category</label>
                        <select id="filterCategory">
                            <option value="all">All Categories</option>
                            <option value="transfer">Transfers</option>
                            <option value="bill">Bill Payments</option>
                            <option value="deposit">Deposits</option>
                        </select>
                    </div>
                    <div class="form-group" style="margin-bottom:0;flex:1;min-width:150px;">
                        <label for="searchDesc">Search</label>
                        <input type="text" id="searchDesc" placeholder="Search description...">
                    </div>
                    <button class="btn btn-outline btn-sm" onclick="resetFilters()" style="margin-bottom:0;">Reset</button>
                </div>
            </div>
            
            <!-- Transactions Table -->
            <div class="card">
                <div class="card-header">
                    <h3>All Transactions</h3>
                    <span style="font-size:13px;color:var(--gray-400);" id="txnCount"></span>
                </div>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Date</th>
                                <th>Transaction ID</th>
                                <th>Description</th>
                                <th>Category</th>
                                <th>Amount</th>
                                <th>Balance After</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody id="transactionsTable">
                            <tr>
                                <td colspan="7">
                                    <div class="empty-state">
                                        <p>No transactions found.</p>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>
    
    <script src="bank.js"></script>
    <script>
        const session = requireAuth();
        const user = getCurrentUser();
        
        document.getElementById('sidebarUser').innerHTML = `
            <div class="user-avatar">${user.fullName.charAt(0).toUpperCase()}</div>
            <div>
                <div class="user-name">${user.fullName}</div>
                <div class="user-email">${user.email}</div>
            </div>
        `;
        
        function renderTransactions() {
            let transactions = getUserTransactions();
            
            // Apply filters
            const filterType = document.getElementById('filterType').value;
            const filterCategory = document.getElementById('filterCategory').value;
            const searchDesc = document.getElementById('searchDesc').value.toLowerCase();
            
            if (filterType !== 'all') {
                transactions = transactions.filter(t => t.type === filterType);
            }
            if (filterCategory !== 'all') {
                transactions = transactions.filter(t => t.category === filterCategory);
            }
            if (searchDesc) {
                transactions = transactions.filter(t => t.description.toLowerCase().includes(searchDesc));
            }
            
            const tbody = document.getElementById('transactionsTable');
            document.getElementById('txnCount').textContent = `(${transactions.length} transactions)`;
            
            if (transactions.length > 0) {
                tbody.innerHTML = transactions.map(txn => `
                    <tr>
                        <td>${formatDate(txn.date)}</td>
                        <td style="font-family:monospace;font-size:12px;">${txn.id.slice(0, 12)}...</td>
                        <td>${txn.description}</td>
                        <td><span class="badge badge-${txn.type === 'credit' ? 'credit' : 'debit'}">${txn.category}</span></td>
                        <td class="${txn.type === 'credit' ? 'amount-credit' : 'amount-debit'}">
                            ${txn.type === 'credit' ? '+' : '-'}${formatCurrency(txn.amount)}
                        </td>
                        <td>${formatCurrency(txn.balanceAfter)}</td>
                        <td><span class="badge badge-${txn.status === 'completed' ? 'credit' : 'pending'}">${txn.status || 'completed'}</span></td>
                    </tr>
                `).join('');
            } else {
                tbody.innerHTML = '<tr><td colspan="7"><div class="empty-state"><p>No transactions match your filters.</p></div></td></tr>';
            }
        }
        
        function resetFilters() {
            document.getElementById('filterType').value = 'all';
            document.getElementById('filterCategory').value = 'all';
            document.getElementById('searchDesc').value = '';
            renderTransactions();
        }
        
        // Listen for filter changes
        document.getElementById('filterType').addEventListener('change', renderTransactions);
        document.getElementById('filterCategory').addEventListener('change', renderTransactions);
        document.getElementById('searchDesc').addEventListener('input', renderTransactions);
        
        // Initial render
        renderTransactions();
    </script>
</body>
</html>
