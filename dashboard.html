<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VaultBank - Dashboard</title>
    <link rel="stylesheet" href="bank.css" />
</head>
<body>
    <div class="main-container">
        <aside class="sidebar">
            <div class="sidebar-logo">
                <div class="logo-small"><div class="icon">VB</div><span>VaultBank</span></div>
            </div>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg> Dashboard</a>
                <a href="transfer.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg> Transfer</a>
                <a href="bills.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="4" width="22" height="16" rx="2" ry="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg> Pay Bills</a>
                <a href="history.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg> History</a>
            </nav>
            <div class="sidebar-footer">
                <div class="user-info" id="sidebarUser"></div>
                <button class="btn btn-outline btn-sm" onclick="logout()" style="width:100%;">Sign Out</button>
            </div>
        </aside>
        <main class="main-content">
            <div class="top-bar">
                <div><h2>Dashboard</h2><div class="breadcrumb">Home / <span>Dashboard</span></div></div>
                <div id="welcomeMsg" style="font-weight:600;color:var(--gray-600);"></div>
            </div>
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon blue"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg></div>
                    <div class="stat-label">Current Balance</div>
                    <div class="stat-value" id="balanceDisplay">$0.00</div>
                    <div class="stat-sub" id="accountTypeDisplay"></div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon green"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg></div>
                    <div class="stat-label">Total Credits</div>
                    <div class="stat-value amount-credit" id="totalCredits">$0.00</div>
                    <div class="stat-sub">This month</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon red"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 18 13.5 8.5 8.5 13.5 1 6"/><polyline points="17 18 23 18 23 12"/></svg></div>
                    <div class="stat-label">Total Debits</div>
                    <div class="stat-value amount-debit" id="totalDebits">$0.00</div>
                    <div class="stat-sub">This month</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon amber"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg></div>
                    <div class="stat-label">Account Number</div>
                    <div class="stat-value" style="font-size:18px;word-break:break-all;" id="accountNumber">---</div>
                </div>
            </div>
            <div class="card">
                <div class="card-header"><h3>Recent Transactions</h3><a href="history.html" class="btn btn-outline btn-sm">View All</a></div>
                <div class="table-container">
                    <table>
                        <thead><tr><th>Date</th><th>Description</th><th>Category</th><th>Amount</th><th>Status</th></tr></thead>
                        <tbody id="recentTransactions"><tr><td colspan="5"><div class="empty-state"><p>No transactions yet.</p></div></td></tr></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>
    <script src="bank.js"></script>
    <script>
        const session = requireAuth();
        if (!session) throw new Error('Not authenticated');
        const user = getCurrentUser();

        document.getElementById('sidebarUser').innerHTML = `
            <div class="user-avatar">${user.fullName.charAt(0).toUpperCase()}</div>
            <div><div class="user-name">${user.fullName}</div><div class="user-email">${user.email}</div></div>
        `;
        document.getElementById('welcomeMsg').textContent = 'Welcome, ' + user.fullName.split(' ')[0] + '! 👋';
        document.getElementById('balanceDisplay').textContent = formatCurrency(user.balance);
        document.getElementById('accountTypeDisplay').textContent = user.accountType.charAt(0).toUpperCase() + user.accountType.slice(1) + ' Account';
        document.getElementById('accountNumber').textContent = user.accountNumber;

        const transactions = getUserTransactions();
        const now = new Date();
        const thisMonth = now.getMonth();
        const thisYear = now.getFullYear();
        let credits = 0, debits = 0;
        transactions.forEach(t => {
            const d = new Date(t.date);
            if (d.getMonth() === thisMonth && d.getFullYear() === thisYear) {
                if (t.type === 'credit') credits += t.amount;
                else debits += t.amount;
            }
        });
        document.getElementById('totalCredits').textContent = formatCurrency(credits);
        document.getElementById('totalDebits').textContent = formatCurrency(debits);

        const recent = transactions.slice(0, 5);
        const tbody = document.getElementById('recentTransactions');
        if (recent.length > 0) {
            tbody.innerHTML = recent.map(t => `
                <tr>
                    <td>${formatDate(t.date)}</td>
                    <td>${t.description}</td>
                    <td><span class="badge badge-${t.type === 'credit' ? 'credit' : 'debit'}">${t.category || t.type}</span></td>
                    <td class="${t.type === 'credit' ? 'amount-credit' : 'amount-debit'}">${t.type === 'credit' ? '+' : '-'}${formatCurrency(t.amount)}</td>
                    <td><span class="badge badge-${t.status === 'completed' ? 'credit' : 'pending'}">${t.status || 'completed'}</span></td>
                </tr>
            `).join('');
        }

        // Mobile user bar
        function addMobileUserBar() {
            if (window.innerWidth <= 992) {
                if (document.querySelector('.mobile-user-bar')) return;
                const bar = document.createElement('div');
                bar.className = 'mobile-user-bar';
                bar.innerHTML = `
                    <div class="user-info-mobile"><div class="user-avatar">${user.fullName.charAt(0).toUpperCase()}</div><div><div class="user-name">${user.fullName}</div><div class="user-email">${user.email}</div></div></div>
                    <button class="btn btn-outline btn-sm" onclick="logout()" style="width:auto;flex-shrink:0;">Sign Out</button>
                `;
                document.querySelector('.top-bar').insertAdjacentElement('afterend', bar);
            } else {
                const bar = document.querySelector('.mobile-user-bar');
                if (bar) bar.remove();
            }
        }
        addMobileUserBar();
        window.addEventListener('resize', addMobileUserBar);
    </script>
</body>
</html>
