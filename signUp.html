<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VaultBank - Create Account</title>
    <link rel="stylesheet" href="bank.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-logo">
                <div class="logo-icon">
                    <svg viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 10.99h7c-.53 4.12-3.28 7.79-7 8.94V12H5V6.3l7-3.11v8.8z"/></svg>
                </div>
                <h1>VaultBank</h1>
                <p>Create your account</p>
            </div>
            
            <div class="error-message" id="errorMsg"></div>
            <div class="success-message" id="successMsg"></div>
            
            <form id="signupForm">
                <div class="form-group">
                    <label for="fullName">Full Name</label>
                    <input type="text" id="fullName" placeholder="John Smith" required>
                </div>
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="you@example.com" required>
                </div>
                <div class="form-group">
                    <label for="phone">Phone Number</label>
                    <input type="tel" id="phone" placeholder="(555) 123-4567" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Min. 6 characters" required minlength="6">
                </div>
                <div class="form-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <input type="password" id="confirmPassword" placeholder="Re-enter password" required>
                </div>
                <div class="form-group">
                    <label for="accountType">Account Type</label>
                    <select id="accountType" required>
                        <option value="">Select account type</option>
                        <option value="checking">Checking Account</option>
                        <option value="savings">Savings Account</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="initialDeposit">Initial Deposit ($)</label>
                    <input type="number" id="initialDeposit" placeholder="100.00" required min="10" step="0.01">
                    <div class="form-hint">Minimum deposit: $10.00</div>
                </div>
                <a href="dashboard.html"><button type="submit" class="btn btn-primary">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/></svg>
                    Create Account
                </button></a>
            </form>
            
            <div class="auth-footer">
                Already have an account? <a href="index.html">Sign In</a>
            </div>
        </div>
    </div>
    
    <script src="bank.js"></script>
    <script>
        document.getElementById('signupForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const errorMsg = document.getElementById('errorMsg');
            const successMsg = document.getElementById('successMsg');
            errorMsg.classList.remove('show');
            successMsg.classList.remove('show');
            
            const fullName = document.getElementById('fullName').value.trim();
            const email = document.getElementById('email').value.trim().toLowerCase();
            const phone = document.getElementById('phone').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const accountType = document.getElementById('accountType').value;
            const initialDeposit = parseFloat(document.getElementById('initialDeposit').value);
            
            // Validation
            if (fullName.length < 2) {
                errorMsg.textContent = 'Please enter your full name.';
                errorMsg.classList.add('show');
                return;
            }
            
            if (!email.includes('@') || !email.includes('.')) {
                errorMsg.textContent = 'Please enter a valid email address.';
                errorMsg.classList.add('show');
                return;
            }
            
            if (password.length < 6) {
                errorMsg.textContent = 'Password must be at least 6 characters long.';
                errorMsg.classList.add('show');
                return;
            }
            
            if (password !== confirmPassword) {
                errorMsg.textContent = 'Passwords do not match.';
                errorMsg.classList.add('show');
                return;
            }
            
            if (!accountType) {
                errorMsg.textContent = 'Please select an account type.';
                errorMsg.classList.add('show');
                return;
            }
            
            if (isNaN(initialDeposit) || initialDeposit < 10) {
                errorMsg.textContent = 'Initial deposit must be at least $10.00.';
                errorMsg.classList.add('show');
                return;
            }
            
            // Check for duplicate email
            const users = getUsers();
            if (users[email]) {
                errorMsg.textContent = 'An account with this email already exists. Please sign in instead.';
                errorMsg.classList.add('show');
                return;
            }
            
            // Create account
            const accountNumber = 'VB' + Date.now().toString().slice(-8) + Math.floor(Math.random() * 90 + 10);
            
            users[email] = {
                fullName: fullName,
                email: email,
                phone: phone,
                password: password,
                accountType: accountType,
                accountNumber: accountNumber,
                balance: initialDeposit,
                createdAt: new Date().toISOString()
            };
            
            saveUsers(users);
            
            // Add initial deposit transaction
            const allTransactions = localStorage.getItem(TRANSACTIONS_KEY);
            const transactions = allTransactions ? JSON.parse(allTransactions) : {};
            transactions[email] = [{
                id: 'txn_' + Date.now(),
                date: new Date().toISOString(),
                description: 'Initial Deposit - Account Opening',
                amount: initialDeposit,
                type: 'credit',
                category: 'deposit',
                balanceAfter: initialDeposit,
                status: 'completed'
            }];
            localStorage.setItem(TRANSACTIONS_KEY, JSON.stringify(transactions));
            
            // Show success
            successMsg.textContent = 'Account created successfully! Redirecting to login...';
            successMsg.classList.add('show');
            
            document.getElementById('signupForm').reset();
            
            setTimeout(() => {
                window.location.href = 'index.html';
            }, 2000);
        });
    </script>
</body>
</html>
